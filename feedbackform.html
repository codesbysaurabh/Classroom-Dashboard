<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="title">
    <img src="https://img.freepik.com/premium-vector/classroom-icon-simple-thin-outline_1223784-18515.jpg?w=1480" width="50" alt="Dashboard Icon">
    <h2>Class Dashboard</h2>
</header>

<nav>
    <ul class="navbar">
        <li class="navbuttons"><a href="index.html">Home</a></li>
        <li class="navbuttons"><a href="timetable.html">Time Table</a></li>
        <li class="navbuttons"><a href="resources.html">Resources</a></li>
        <li class="navbuttons"><a href="feedbackform.html">Feedback</a></li>
    </ul>
</nav>

<main>
    <h2 class="page-title">Feedback Form</h2>
    <p class="form-subtitle">Submit your feedback or suggestions</p>

    <div class="form-container">
        <form method="post">

            <!-- Personal Info -->
            <fieldset>
                <legend>Personal Information</legend>

                <label for="fname">Full Name *</label>
                <input type="text" id="fname" name="fname" placeholder="Enter your name" required>

                <label for="rollno">Roll No.</label>
                <input type="text" id="rollno" name="rollno" placeholder="Enter your roll number">

                <label for="email">Email *</label>
                <input type="email" id="email" name="email" placeholder="example@gmail.com" required>

                <label for="phone">Phone No.</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
            </fieldset>

            <!-- Academic -->
            <fieldset>
                <legend>Academic Details</legend>

                <label for="semester">Semester</label>
                <select id="semester" name="semester">
                    <option>I</option>
                    <option>II</option>
                    <option>III</option>
                    <option>IV</option>
                    <option>V</option>
                    <option>VI</option>
                    <option>VII</option>
                    <option>VIII</option>
                </select>

                <label for="section">Section</label>
                <input type="text" id="section" name="section" maxlength="3" >
            </fieldset>

            <!-- Feedback Type -->
            <fieldset>
                <legend>Feedback Type</legend>

                <div class="radio-group">
                    <label><input type="radio" name="feedback_type" value="website_issue"> Website Issue</label>
                    <label><input type="radio" name="feedback_type" value="resources_request"> Resources Request</label>
                    <label><input type="radio" name="feedback_type" value="suggestions"> Suggestions</label>
                    <label><input type="radio" name="feedback_type" value="general"> General Feedback</label>
                    <label><input type="radio" name="feedback_type" value="other"> Other</label>
                </div>
            </fieldset>

            <!-- Message -->
            <fieldset>
                <legend>Message</legend>
                <textarea id="message" name="message" rows="5" maxlength="500" placeholder="Enter your feedback"></textarea>
            </fieldset>

            <div class="form-buttons">
                <input type="reset" class="btn secondary">
                <input type="submit" class="btn primary">
            </div>

        </form>
    </div>
</main>

<footer>
    <p>&copy; <time datetime="2026">2026</time> Class Dashboard</p>

        Contact:

</footer>

</body>
</html>
